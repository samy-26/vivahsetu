[app]
name = "vivahsetu-backend"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 3001
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[env]
  PORT = "3001"
  NODE_ENV = "production"

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
